name: focus_trail
description: "FocusTrail - Productivity Tracker offline-first task management app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^6.1.4

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  shimmer: ^3.0.0

  # Charts for dashboard
  fl_chart: ^0.69.0

  # Local notifications
  flutter_local_notifications: ^18.0.1

  # File operations for export
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  open_filex: ^4.6.0
  universal_html: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # - images/logo.png
    # - assets/images/logo.png
    - assets/images/logo.png
    # - images/a_dot_ham.jpeg
