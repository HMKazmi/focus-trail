<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusTrail</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- ═══════════════════════ ROOT APP ═══════════════════════ -->
  <div id="app">

    <!-- ── HEADER ─────────────────────────────────────────── -->
    <header class="header">
      <div class="header-brand">
        <span class="brand-icon">✦</span>
        <span class="brand-name">FocusTrail</span>
      </div>
      <button id="btn-logout" class="btn-icon" title="Logout" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <!-- ── GLOBAL STATUS BAR ───────────────────────────────── -->
    <div id="status-bar" class="status-bar" hidden>
      <span id="status-text"></span>
    </div>

    <!-- ══════════════ VIEW: LOGGED OUT ══════════════════════ -->
    <section id="view-login" class="view">
      <div class="login-card">
        <h2 class="card-title">Welcome back</h2>
        <p class="card-sub">Sign in to your account</p>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" autocomplete="email"
                   placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" autocomplete="current-password"
                   placeholder="••••••••" required />
          </div>
          <p id="login-error" class="field-error" hidden></p>
          <button type="submit" class="btn btn-primary" id="btn-login">
            <span class="btn-label">Sign in</span>
            <span class="spinner" hidden></span>
          </button>
        </form>
      </div>
    </section>

    <!-- ══════════════ VIEW: LOGGED IN ═══════════════════════ -->
    <section id="view-tasks" class="view" hidden>

      <!-- user greeting -->
      <div class="user-bar">
        <span id="user-greeting" class="user-greeting"></span>
      </div>

      <!-- filter / search row -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search-input" type="search" placeholder="Search tasks…" />
        </div>
        <select id="filter-status" class="select-sm">
          <option value="">All</option>
          <option value="todo">To do</option>
          <option value="in_progress">In progress</option>
          <option value="done">Done</option>
        </select>
      </div>

      <!-- task list -->
      <div id="task-list-wrap">
        <div id="task-loading" class="loading-row" hidden>
          <span class="spinner"></span>
          <span>Loading tasks…</span>
        </div>
        <p id="task-empty" class="empty-msg" hidden>No tasks yet — add one below!</p>
        <ul id="task-list" class="task-list"></ul>
      </div>

      <!-- add task form -->
      <div class="add-task-panel">
        <button id="btn-toggle-add" class="btn btn-secondary btn-sm add-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" class="icon-sm">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New task
        </button>

        <form id="add-task-form" class="add-task-form collapsed" novalidate>
          <div class="field">
            <input id="task-title" type="text" placeholder="Task title *" maxlength="200" required />
          </div>
          <div class="field">
            <textarea id="task-desc" placeholder="Description (optional)"
                      maxlength="2000" rows="2"></textarea>
          </div>
          <p id="add-task-error" class="field-error" hidden></p>
          <div class="add-task-actions">
            <button type="button" id="btn-cancel-add" class="btn btn-ghost btn-sm">Cancel</button>
            <button type="submit" class="btn btn-primary btn-sm" id="btn-add-task">
              <span class="btn-label">Add task</span>
              <span class="spinner" hidden></span>
            </button>
          </div>
        </form>
      </div>

    </section>

  </div><!-- /#app -->

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
