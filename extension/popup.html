<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusTrail</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- ═══════════════════════ ROOT APP ═══════════════════════ -->
  <div id="app">

    <!-- ── HEADER ─────────────────────────────────────────── -->
    <header class="header">
      <div class="header-brand">
        <span class="brand-icon">✦</span>
        <span class="brand-name">FocusTrail</span>
      </div>
      <button id="btn-logout" class="btn-icon" title="Logout" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <!-- ── GLOBAL STATUS BAR ───────────────────────────────── -->
    <div id="status-bar" class="status-bar" hidden>
      <span id="status-text"></span>
    </div>

    <!-- ══════════════ VIEW: LOGGED OUT ══════════════════════ -->
    <section id="view-login" class="view">
      <div class="login-card">
        <h2 class="card-title">Welcome back</h2>
        <p class="card-sub">Sign in to your account</p>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" autocomplete="email"
                   placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" autocomplete="current-password"
                   placeholder="••••••••" required />
          </div>
          <div class="field checkbox-field">
            <label class="checkbox-label">
              <input id="remember-me" type="checkbox" />
              <span>Remember me</span>
            </label>
          </div>
          <p id="login-error" class="field-error" hidden></p>
          <button type="submit" class="btn btn-primary" id="btn-login">
            <span class="btn-label">Sign in</span>
            <span class="spinner" hidden></span>
          </button>
        </form>
      </div>
    </section>

    <!-- ══════════════ VIEW: LOGGED IN ═══════════════════════ -->
    <section id="view-tasks" class="view" hidden>

      <!-- user greeting + add button -->
      <div class="user-bar">
        <span id="user-greeting" class="user-greeting"></span>
        <button id="btn-toggle-add" class="btn btn-primary btn-xs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" class="icon-xs">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Task
        </button>
      </div>

      <!-- mini dashboard stats -->
      <div id="mini-stats" class="mini-stats" hidden></div>

      <!-- filter / search row -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search-input" type="search" placeholder="Search tasks…" />
        </div>
        <select id="filter-status" class="select-sm">
          <option value="">All</option>
          <option value="todo">To do</option>
          <option value="in_progress">In progress</option>
          <option value="done">Done</option>
        </select>
      </div>

      <!-- task list -->
      <div id="task-list-wrap">
        <div id="task-loading" class="loading-row" hidden>
          <span class="spinner"></span>
          <span>Loading tasks…</span>
        </div>
        <p id="task-empty" class="empty-msg" hidden>No tasks yet — click "New task" to add one!</p>
        <ul id="task-list" class="task-list"></ul>
      </div>

    </section>

    <!-- Add Task Modal/Dialog -->
    <div id="add-task-modal" class="modal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>New Task</h3>
          <button id="btn-close-modal" class="btn-icon" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        
        <form id="add-task-form" novalidate>
          <div class="field">
            <label for="task-title">Title *</label>
            <input id="task-title" type="text" placeholder="What needs to be done?" 
                   maxlength="200" required />
          </div>
          
          <div class="field">
            <label for="task-desc">Description</label>
            <textarea id="task-desc" placeholder="Add more details (optional)"
                      maxlength="2000" rows="3"></textarea>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="task-priority">Priority</label>
              <select id="task-priority" class="select-sm">
                <option value="low">🟢 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
              </select>
            </div>

            <div class="field">
              <label for="task-status">Status</label>
              <select id="task-status" class="select-sm">
                <option value="todo" selected>To do</option>
                <option value="in_progress">In progress</option>
                <option value="done">Done</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="task-due-date">Due Date</label>
            <input id="task-due-date" type="datetime-local" />
          </div>

          <p id="add-task-error" class="field-error" hidden></p>
          
          <div class="modal-footer">
            <button type="button" id="btn-cancel-add" class="btn btn-ghost">Cancel</button>
            <button type="submit" class="btn btn-primary" id="btn-add-task">
              <span class="btn-label">Create Task</span>
              <span class="spinner" hidden></span>
            </button>
          </div>
        </form>
      </div>
    </div>

  </div><!-- /#app -->

  <script src="config.js"></script>
  <script src="logger.js"></script>
  <script src="popup.js"></script>
</body>
</html>
